version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - db_data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  telegram-bot:
    build: ./backend
    env_file:
      - ./backend/.env
    command: python -m app.telegram_bot
    restart: unless-stopped
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
